<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Kitchen Logbook</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#13ec5b",
              "background-light": "#f6f8f6",
              "background-dark": "#102216",
            },
            fontFamily: {
              "display": ["Space Grotesk", "sans-serif"],
              "serif": ["Young Serif", "serif"],
              "mono": ["JetBrains Mono", "monospace"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&amp;family=Young+Serif&amp;family=JetBrains+Mono:wght@400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
          font-variation-settings:
          'FILL' 0,
          'wght' 400,
          'GRAD' 0,
          'opsz' 24
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col justify-between overflow-x-hidden">
<div class="flex-grow flex flex-col w-full max-w-md mx-auto relative group/design-root">
<header class="flex items-center p-4 pb-2 justify-between border-b-2 border-slate-900 dark:border-slate-100">
<h2 class="text-lg font-bold leading-tight tracking-[-0.015em] flex-1 font-serif uppercase">Kitchen Logbook</h2>
</header>
<main class="flex-grow flex flex-col justify-center px-6 py-8 h-full">
<div class="flex flex-col items-center gap-8 text-center">
<div class="w-full max-w-[280px] aspect-square flex items-center justify-center border-4 border-slate-900 dark:border-slate-100 rounded-lg p-6 bg-white dark:bg-slate-800 shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] dark:shadow-[8px_8px_0px_0px_rgba(255,255,255,1)]">
<span class="material-symbols-outlined text-8xl text-slate-900 dark:text-slate-100" style="font-size: 120px;">
                        inventory_2
                    </span>
</div>
<div class="flex flex-col items-center gap-4 max-w-sm">
<h1 class="text-3xl md:text-4xl font-serif font-bold leading-tight uppercase tracking-wide">Shelves are bare</h1>
<p class="text-sm font-mono leading-relaxed text-slate-600 dark:text-slate-400">
                        No inventory detected. Start logging your supplies to track freshness and waste.
                    </p>
</div>
<div class="w-full flex flex-col gap-4 mt-4">
<button class="w-full h-14 bg-primary text-background-dark font-bold font-mono text-lg uppercase tracking-wider rounded border-2 border-slate-900 shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] hover:translate-y-[2px] hover:translate-x-[2px] hover:shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined font-bold">add_box</span>
                        Log First Item
                    </button>
<div class="flex flex-col gap-3 mt-4 w-full">
<button class="w-full h-12 bg-transparent text-slate-900 dark:text-slate-100 font-bold font-mono text-sm uppercase tracking-wider border-2 border-slate-900 dark:border-slate-100 border-dashed rounded flex items-center justify-center gap-2 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined">barcode_scanner</span>
                            Scan Barcode
                        </button>
<button class="w-full h-12 bg-transparent text-slate-600 dark:text-slate-400 font-bold font-mono text-sm uppercase tracking-wider underline underline-offset-4 flex items-center justify-center gap-2 hover:text-slate-900 dark:hover:text-slate-100 transition-colors">
<span class="material-symbols-outlined">settings_backup_restore</span>
                            Restore Backup
                        </button>
</div>
</div>
</div>
</main>
</div>
<nav class="fixed bottom-0 left-0 right-0 w-full max-w-md mx-auto border-t-2 border-slate-900 dark:border-slate-100 bg-background-light dark:bg-background-dark z-50">
<div class="flex justify-around items-center h-16 px-2">
<a class="flex flex-col items-center justify-center w-full h-full text-primary gap-1" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">inventory_2</span>
<span class="text-[10px] font-mono font-bold uppercase tracking-wider">Inventory</span>
</a>
<a class="flex flex-col items-center justify-center w-full h-full text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-slate-100 gap-1 transition-colors" href="#">
<span class="material-symbols-outlined">menu_book</span>
<span class="text-[10px] font-mono font-bold uppercase tracking-wider">Recipes</span>
</a>
<a class="flex flex-col items-center justify-center w-full h-full text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-slate-100 gap-1 transition-colors" href="#">
<span class="material-symbols-outlined">shopping_cart</span>
<span class="text-[10px] font-mono font-bold uppercase tracking-wider">List</span>
</a>
<a class="flex flex-col items-center justify-center w-full h-full text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-slate-100 gap-1 transition-colors" href="#">
<span class="material-symbols-outlined">settings</span>
<span class="text-[10px] font-mono font-bold uppercase tracking-wider">Settings</span>
</a>
</div>
<div class="h-safe-area-bottom"></div>
</nav>
<div class="h-16 w-full"></div>
</body></html>
