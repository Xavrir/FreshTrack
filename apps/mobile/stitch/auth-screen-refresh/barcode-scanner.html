<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;family=Space+Mono&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#f2aa0d",
              "background-light": "#f8f7f5",
              "background-dark": "#0C0C0C",
            },
            fontFamily: {
              "display": ["Plus Jakarta Sans"],
              "mono": ["Space Mono"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<title>FreshTrack Barcode Scanner</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 overflow-hidden">
<div class="relative flex h-screen w-full flex-col overflow-hidden">
<!-- Header -->
<header class="absolute top-0 left-0 right-0 z-20 flex items-center justify-between p-6 bg-gradient-to-b from-background-dark/80 to-transparent">
<div class="flex items-center gap-3">
<div class="size-10 shrink-0 bg-primary/10 rounded-lg flex items-center justify-center border border-primary/20">
<img alt="FreshTrack Professional Logo" class="size-6 object-contain" data-alt="FreshTrack Professional Brand Logo" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBus7G1sw_VM_3KVmnGDCQxhFXpQDcNAw02mMOR7fEUlTP5eWAAT70SI2Vvez1dvzmLoUQ43w3gBoz3KI4CkVVpeqUnPc15v6coc-TgRP39iiITH_rwfiSAlO3VpclVr_XsLWq-pDvZoAeWI3WJHMjZAsXI2a_uauuJ_shwVltcQ-mvmNDrdtVw4x_pn4HiYHxzPz44eeoUHzkes9y2Iww70xFv8pMswwxdlADFRHc0vmWujPho8BQWLTXutrANpm3MZLLW1J9so-kP"/>
</div>
<h1 class="text-white text-lg font-bold tracking-tight">FreshTrack</h1>
</div>
<button class="flex size-10 items-center justify-center rounded-full bg-background-dark/40 border border-white/10 text-white backdrop-blur-md">
<span class="material-symbols-outlined">help</span>
</button>
</header>
<!-- Viewfinder Area -->
<main class="relative flex-1 flex flex-col items-center justify-center">
<!-- Simulated Camera Feed Background -->
<div class="absolute inset-0 z-0 bg-neutral-900" data-alt="Blurred grocery store shelf with fresh produce" style="background-image: linear-gradient(rgba(12, 12, 12, 0.4), rgba(12, 12, 12, 0.4)), url('https://lh3.googleusercontent.com/aida-public/AB6AXuC6DFVUz4AzMaFTglTFg4vnh5Hr7ktkrGusCZjGyVaLfwnjypYhGTpV0W6tN8XSU0VU9ZqX8OV-xW_plN5jhiZRho5GdnHc8Z-PQGD2qbI_v2kmPYlSTZcdWEifxRNDY9FdwQ-hf36l_z41qY5EgxkD6J1ox_9MFfWtJBME27ytP15a_Oc9MBDvf0wRv60RpSbunN5j2w1hdWeESFJpY4S7lfqnrqNzed80UahWnRvfI8kH6wHWQflYgeqac101V3rLYg0o0JlwwlzQ'); background-size: cover; background-position: center;">
</div>
<!-- Focus Box Container -->
<div class="relative z-10 w-72 h-48 md:w-96 md:h-64">
<!-- Amber Focus Corners -->
<div class="absolute top-0 left-0 w-8 h-8 border-t-4 border-l-4 border-primary rounded-tl-lg"></div>
<div class="absolute top-0 right-0 w-8 h-8 border-t-4 border-r-4 border-primary rounded-tr-lg"></div>
<div class="absolute bottom-0 left-0 w-8 h-8 border-b-4 border-l-4 border-primary rounded-bl-lg"></div>
<div class="absolute bottom-0 right-0 w-8 h-8 border-b-4 border-r-4 border-primary rounded-br-lg"></div>
<!-- Scanning Line -->
<div class="absolute top-1/2 left-0 right-0 h-0.5 bg-primary/60 shadow-[0_0_15px_rgba(242,170,13,0.8)]"></div>
<!-- Glass Overlay -->
<div class="absolute inset-0 bg-primary/5 backdrop-blur-[1px]"></div>
</div>
<!-- Status Text -->
<div class="mt-8 z-10">
<p class="font-mono text-primary text-lg font-bold tracking-[0.2em] drop-shadow-md">SCANNING...</p>
</div>
</main>
<!-- Bottom Controls -->
<footer class="relative z-20 w-full bg-background-dark p-6 pb-10 border-t border-white/5">
<div class="max-w-md mx-auto space-y-4">
<div class="flex items-center justify-center gap-8 mb-6">
<button class="flex flex-col items-center gap-2 group">
<div class="size-12 rounded-full bg-white/5 flex items-center justify-center group-hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-white">flash_on</span>
</div>
<span class="text-[10px] text-slate-400 uppercase tracking-widest">Flash</span>
</button>
<button class="flex flex-col items-center gap-2 group">
<div class="size-14 rounded-full bg-primary flex items-center justify-center shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-background-dark font-bold">barcode_scanner</span>
</div>
<span class="text-[10px] text-primary uppercase tracking-widest font-bold">Auto</span>
</button>
<button class="flex flex-col items-center gap-2 group">
<div class="size-12 rounded-full bg-white/5 flex items-center justify-center group-hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-white">history</span>
</div>
<span class="text-[10px] text-slate-400 uppercase tracking-widest">Recent</span>
</button>
</div>
<div class="flex flex-col gap-3">
<button class="w-full py-4 px-6 bg-primary text-background-dark font-bold rounded-xl transition-transform active:scale-[0.98] uppercase tracking-wider text-sm">
                        Enter Manually
                    </button>
<button class="w-full py-4 px-6 bg-white/5 text-slate-300 font-semibold rounded-xl hover:bg-white/10 transition-all uppercase tracking-wider text-sm border border-white/5">
                        Cancel
                    </button>
</div>
</div>
</footer>
<!-- Decorative UI elements -->
<div class="absolute top-1/2 left-4 -translate-y-1/2 flex flex-col gap-4 z-10 opacity-40">
<div class="h-16 w-1 bg-white/20 rounded-full overflow-hidden">
<div class="h-1/2 w-full bg-primary"></div>
</div>
</div>
</div>
</body></html>
