<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#e8913b",
                        "background-light": "#FBF7F0",
                        "background-dark": "#211911",
                        "deep-espresso": "#2D1B0E",
                        "warm-gray": "#8B7E74",
                        "warm-sand": "#F5EDE0",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-deep-espresso antialiased">
<div class="relative flex h-screen w-full max-w-[430px] mx-auto flex-col overflow-x-hidden overflow-y-auto">
<!-- Top Navigation -->
<div class="flex items-center p-4 pt-6 justify-between">
<button class="text-deep-espresso dark:text-slate-100 flex size-12 shrink-0 items-center justify-center rounded-full hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined" style="font-size: 28px;">arrow_back</span>
</button>
<h2 class="text-deep-espresso dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-12">FreshTrack</h2>
</div>
<!-- Header Section -->
<div class="px-6 pt-8 pb-4 text-center">
<h1 class="text-deep-espresso dark:text-slate-100 text-[32px] font-bold leading-tight">Welcome to FreshTrack!</h1>
<p class="text-warm-gray dark:text-slate-400 text-base font-medium mt-2">Let's set up your household</p>
</div>
<!-- Selection Cards -->
<div class="px-6 space-y-4 py-4">
<!-- Create Card -->
<button class="w-full flex items-center gap-4 rounded-xl bg-white dark:bg-slate-800 p-5 shadow-[0_8px_20px_rgba(45,27,14,0.06)] border border-primary/10 text-left group active:scale-[0.98] transition-all">
<div class="flex size-14 items-center justify-center rounded-xl bg-primary/10 text-primary">
<span class="material-symbols-outlined" style="font-size: 32px; font-variation-settings: 'FILL' 1;">home</span>
</div>
<div class="flex flex-col gap-1 flex-1">
<p class="text-deep-espresso dark:text-slate-100 text-lg font-bold leading-tight">Create New Household</p>
<p class="text-warm-gray dark:text-slate-400 text-sm font-normal leading-normal">Start a fresh inventory for your home</p>
</div>
<div class="text-primary/40 group-hover:text-primary transition-colors">
<span class="material-symbols-outlined">chevron_right</span>
</div>
</button>
<!-- Join Card -->
<button class="w-full flex items-center gap-4 rounded-xl bg-white dark:bg-slate-800 p-5 shadow-[0_8px_20px_rgba(45,27,14,0.06)] border border-transparent text-left group active:scale-[0.98] transition-all">
<div class="flex size-14 items-center justify-center rounded-xl bg-primary/10 text-primary">
<span class="material-symbols-outlined" style="font-size: 32px; font-variation-settings: 'FILL' 1;">group</span>
</div>
<div class="flex flex-col gap-1 flex-1">
<p class="text-deep-espresso dark:text-slate-100 text-lg font-bold leading-tight">Join Existing Household</p>
<p class="text-warm-gray dark:text-slate-400 text-sm font-normal leading-normal">Connect with your family members</p>
</div>
<div class="text-primary/40 group-hover:text-primary transition-colors">
<span class="material-symbols-outlined">chevron_right</span>
</div>
</button>
</div>
<!-- Input Section -->
<div class="px-6 pt-8 pb-4">
<label class="block text-[11px] font-bold tracking-widest text-warm-gray uppercase mb-3 ml-1">Household Name</label>
<div class="relative">
<input class="w-full h-16 rounded-xl bg-warm-sand dark:bg-slate-800/50 border-2 border-primary/20 focus:border-primary focus:ring-0 px-5 text-deep-espresso dark:text-slate-100 font-medium text-lg placeholder:text-warm-gray/50 transition-all shadow-inner" placeholder="e.g. Keluarga Rizki" type="text"/>
<div class="absolute right-4 top-1/2 -translate-y-1/2 text-primary">
<span class="material-symbols-outlined">edit</span>
</div>
</div>
<p class="text-warm-gray text-xs mt-3 px-1 italic">This name will be visible to everyone you invite.</p>
</div>
<!-- Spacer -->
<div class="flex-grow"></div>
<!-- Footer Button -->
<div class="p-6 pb-10">
<button class="w-full h-16 bg-primary hover:bg-primary/90 text-deep-espresso font-bold text-lg rounded-xl shadow-[0_6px_15px_rgba(232,145,58,0.3)] active:shadow-none active:translate-y-0.5 transition-all flex items-center justify-center gap-2">
                Create
                <span class="material-symbols-outlined">arrow_forward</span>
</button>
<div class="mt-6 flex justify-center">
<div class="flex gap-2">
<div class="size-2 rounded-full bg-primary"></div>
<div class="size-2 rounded-full bg-primary/30"></div>
<div class="size-2 rounded-full bg-primary/30"></div>
</div>
</div>
</div>
</div>
</body></html>
