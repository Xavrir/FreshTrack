<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>FreshTrack Main Pantry Dashboard</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=DM+Sans:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#e8913b",
                        "background-light": "#fbf7f0",
                        "background-dark": "#211911",
                        "warm-sand": "#f5ede0",
                        "terracotta": "#e8913a",
                        "pantry-border": "#e8e0d6"
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"],
                        "sans": ["DM Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .neo-shadow {
            box-shadow: 0 4px 12px rgba(45, 27, 14, 0.05);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative mx-auto min-h-screen w-full max-w-[393px] bg-background-light dark:bg-background-dark flex flex-col pb-24">
<header class="pt-6 px-5 pb-4 bg-background-light dark:bg-background-dark sticky top-0 z-10">
<div class="flex justify-between items-center mb-1">
<div class="flex flex-col">
<h1 class="font-sans text-[22px] font-bold text-[#2D1B0E] dark:text-slate-100 leading-none">FreshTrack</h1>
<div class="h-[3px] w-12 bg-primary mt-1 rounded-full"></div>
</div>
<div class="flex gap-4">
<a class="text-[13px] font-bold text-terracotta tracking-wider uppercase" href="#">History</a>
<a class="text-[13px] font-bold text-terracotta tracking-wider uppercase" href="#">Settings</a>
</div>
</div>
</header>
<div class="px-5 py-3">
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-primary">search</span>
<input class="w-full h-12 pl-12 pr-4 bg-warm-sand dark:bg-slate-800 border-none rounded-xl focus:ring-2 focus:ring-primary/50 text-slate-900 dark:text-slate-100 placeholder:text-slate-500 font-medium" placeholder="Search pantry items" type="text"/>
</div>
</div>
<div class="flex gap-3 px-5 py-3 overflow-x-auto no-scrollbar">
<button class="px-6 py-2 bg-primary text-white rounded-full text-sm font-bold neo-shadow">All</button>
<button class="px-6 py-2 bg-warm-sand dark:bg-slate-800 text-slate-600 dark:text-slate-300 rounded-full text-sm font-medium">Expiring</button>
<button class="px-6 py-2 bg-warm-sand dark:bg-slate-800 text-slate-600 dark:text-slate-300 rounded-full text-sm font-medium">Fresh</button>
</div>
<div class="px-5 mt-4 space-y-4 flex-grow">
<!-- Card 1 -->
<div class="p-4 bg-white dark:bg-slate-900 border border-pantry-border dark:border-slate-800 rounded-xl neo-shadow flex justify-between items-center">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-lg bg-warm-sand/50 dark:bg-slate-800 flex items-center justify-center">
<span class="material-symbols-outlined text-primary">flatware</span>
</div>
<div>
<h3 class="font-bold text-[#2D1B0E] dark:text-slate-100">Susu UHT Diamond</h3>
<p class="text-sm text-slate-500 font-medium">1 pcs</p>
</div>
</div>
<div class="px-3 py-1 bg-[#D64545]/10 border border-[#D64545]/20 rounded-lg">
<span class="text-[11px] font-bold text-[#D64545]">2D LEFT</span>
</div>
</div>
<!-- Card 2 -->
<div class="p-4 bg-white dark:bg-slate-900 border border-pantry-border dark:border-slate-800 rounded-xl neo-shadow flex justify-between items-center">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-lg bg-warm-sand/50 dark:bg-slate-800 flex items-center justify-center">
<span class="material-symbols-outlined text-primary">lunch_dining</span>
</div>
<div>
<h3 class="font-bold text-[#2D1B0E] dark:text-slate-100">Indomie Goreng</h3>
<p class="text-sm text-slate-500 font-medium">5 pcs</p>
</div>
</div>
<div class="px-3 py-1 bg-[#3B9B6D]/10 border border-[#3B9B6D]/20 rounded-lg">
<span class="text-[11px] font-bold text-[#3B9B6D]">14D LEFT</span>
</div>
</div>
<!-- Card 3 -->
<div class="p-4 bg-white dark:bg-slate-900 border border-pantry-border dark:border-slate-800 rounded-xl neo-shadow flex justify-between items-center">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-lg bg-warm-sand/50 dark:bg-slate-800 flex items-center justify-center">
<span class="material-symbols-outlined text-primary">egg</span>
</div>
<div>
<h3 class="font-bold text-[#2D1B0E] dark:text-slate-100">Telur Ayam</h3>
<p class="text-sm text-slate-500 font-medium">12 pcs</p>
</div>
</div>
<div class="px-3 py-1 bg-[#E5A100]/10 border border-[#E5A100]/20 rounded-lg">
<span class="text-[11px] font-bold text-[#E5A100]">5D LEFT</span>
</div>
</div>
</div>
<div class="fixed bottom-24 left-1/2 -translate-x-1/2 w-full max-w-[393px] px-5 flex gap-3 pointer-events-none">
<button class="pointer-events-auto flex-1 h-14 bg-transparent border-2 border-primary text-primary font-bold rounded-xl flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[20px]">edit_note</span>
                Manual Add
            </button>
<button class="pointer-events-auto flex-1 h-14 bg-primary text-[#2D1B0E] font-bold rounded-xl flex items-center justify-center gap-2 shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-[20px]">barcode_scanner</span>
                Scan Barcode
            </button>
</div>
<nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[393px] bg-background-light dark:bg-background-dark border-t border-pantry-border dark:border-slate-800 px-6 py-3 flex justify-between items-center">
<a class="flex flex-col items-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined fill-1">home</span>
<span class="text-[10px] font-bold">HOME</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400" href="#">
<span class="material-symbols-outlined">inventory_2</span>
<span class="text-[10px] font-bold">PANTRY</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400" href="#">
<span class="material-symbols-outlined">menu_book</span>
<span class="text-[10px] font-bold">RECIPES</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400" href="#">
<span class="material-symbols-outlined">shopping_cart</span>
<span class="text-[10px] font-bold">LIST</span>
</a>
</nav>
</div>
</body></html>
